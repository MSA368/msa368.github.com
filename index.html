<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lataussivusto</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #1e3a8a, #000000);
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background: #111827;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 100%;
            text-align: center;
            border: 1px solid #374151;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            color: #ffffff;
        }
        p {
            color: #9ca3af;
            margin-bottom: 24px;
        }
        .download-card {
            background: #1f2937;
            padding: 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            border: 1px solid #374151;
        }
        .file-info {
            text-align: left;
        }
        .file-name {
            font-weight: bold;
            display: block;
            word-break: break-all;
            color: #ffffff;
        }
        .file-size {
            font-size: 12px;
            color: #9ca3af;
        }
        .btn {
            background-color: #2563eb;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Lataa tiedostot</h1>
    <p>Valitse alta haluamasi tiedosto ja lataa se laitteellesi.</p>

    <!-- Tiedosto 1 -->
    <div class="download-card">
        <div class="file-info">
            <span class="file-name">a.zip</span>
            <span class="file-size">Pakattu tiedosto</span>
        </div>
        <a href="a.zip" download class="btn">Lataa</a>
    </div>

    <!-- Tiedosto 2 -->
    <div class="download-card">
        <div class="file-info">
            <span class="file-name">b.zip</span>
            <span class="file-size">Pakattu tiedosto</span>
        </div>
        <a href="b.zip" download class="btn">Lataa</a>
    </div>

    <!-- Tiedosto 3 -->
    <div class="download-card">
        <div class="file-info">
            <span class="file-name">c.zip</span>
            <span class="file-size">Pakattu tiedosto</span>
        </div>
        <a href="c.zip" download class="btn">Lataa</a>
    </div>

    <!-- Tiedosto 4 -->
    <div class="download-card">
        <div class="file-info">
            <span class="file-name">d.zip</span>
            <span class="file-size">Pakattu tiedosto</span>
        </div>
        <a href="d.zip" download class="btn">Lataa</a>
    </div>
</div>

</body>
</html>
